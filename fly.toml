# Fly.io config — https://fly.io/docs/reference/configuration/
# Private by default: `fly deploy` builds the Dockerfile and stores the image in
# your private Fly registry. SQLite lives on a Fly Volume mounted at /app/data.
app = "online-bibliotheek-catalogus"   # must be globally unique; change if taken
primary_region = "ams"                  # Amsterdam (EU)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  OBC_DB = "/app/data/catalog.db"
  # Weekly automated refresh. normalize streams in batches (~190MB peak), so this
  # runs fine on the 512MB VM below — no scaling needed.
  OBC_SYNC_HOURS = "168"    # scrape --sync + normalize (incremental, weekly)
  OBC_LISTS_HOURS = "168"   # lists update + normalize (weekly)

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1  # one machine: single SQLite writer + the scheduler

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[mounts]
  source = "catalog_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
