# Fly.io config — https://fly.io/docs/reference/configuration/
# Private by default: `fly deploy` builds the Dockerfile and stores the image in
# your private Fly registry. SQLite lives on a Fly Volume mounted at /app/data.
app = "online-bibliotheek-catalogus"   # must be globally unique; change if taken
primary_region = "ams"                  # Amsterdam (EU)

# Swap for the nightly batch. `normalize` precomputes the "meer zoals dit"
# recommendations, whose Truncated-SVD peaks at ~1.1GB on the 64k catalog — more than
# the 512MB VM's RAM. Swap absorbs that once-a-day peak instead of paying for a bigger
# always-on VM; serving itself stays within RAM. NOTE: this MUST be a top-level key —
# nested under [[vm]] flyctl silently ignores it (SwapTotal stays 0 and the rebuild
# gets OOM-killed, which freezes the catalog and leaves recommendations unbuilt).
swap_size_mb = 1024

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  OBC_DB = "/app/data/catalog.db"
  # Unbuffered stdout/stderr so the refresh subprocesses (scrape/normalize/similar,
  # spawned by scheduler._run) stream their progress logs live instead of flushing
  # only on exit — otherwise a ~1h normalize shows nothing until it finishes.
  PYTHONUNBUFFERED = "1"
  # Absolute origin for canonical / Open Graph / sitemap URLs. Set to your custom
  # domain if you add one.
  OBC_SITE_URL = "https://online-bibliotheek-catalogus.fly.dev"
  # Refresh the catalog on every machine start (i.e. after each deploy): a full
  # harvest on a fresh volume, otherwise an incremental sync. Runs in-process in a
  # background thread. Local dev leaves this unset, so it never scrapes.
  OBC_REFRESH_ON_STARTUP = "1"
  # Enrich detail-only fields (Leeftijd, explicit Serie, keywords) from the detail
  # pages during the refresh. The first pass fetches every detail page (~hours,
  # resumable, zero-downtime); afterwards only new titles are fetched. Set to "0" to
  # pause it.
  OBC_ENRICH = "1"
  # Daily refresh is driven by a Fly scheduled (cron) machine that POSTs to
  # /admin/refresh; the work runs in-process here (normalize streams at ~190MB, so
  # the 512MB VM below is fine). Set the shared secret with:
  #   fly secrets set OBC_REFRESH_TOKEN=$(openssl rand -hex 32)

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1  # one machine: single SQLite writer + the scheduler

  [[http_service.checks]]
    method = "GET"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[mounts]
  source = "catalog_data"
  destination = "/app/data"
  # 68k per-book record files are inode-heavy; 2GB gives enough inodes (a 1GB ext4
  # volume runs out before it runs out of blocks). Existing volumes are extended by
  # the deploy pipeline; this sizes any freshly-created one.
  initial_size = "2gb"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  # Serving stays within RAM. The nightly `normalize` peaks at ~1.1GB (Truncated-SVD
  # for the "meer zoals dit" recommendations); that peak is absorbed by swap — see the
  # top-level `swap_size_mb` above. Swap must live at the top level, not here.
