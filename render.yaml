# Render Blueprint — https://render.com/docs/blueprint-spec
# One web service built from the Dockerfile in this (private) repo, with a
# persistent disk for the SQLite catalog. Region: Frankfurt (EU).
#
# Note: persistent disks require a paid instance type (Starter and up); Render's
# free tier has no disk and spins down. The disk attaches to this single service,
# so scheduled refresh runs in-process (OBC_*_HOURS), like on Railway.
services:
  - type: web
    name: online-bibliotheek-catalogus
    runtime: docker
    repo: https://github.com/h11t-labs/online-bibliotheek-catalogus
    branch: main
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    disk:
      name: catalog-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: OBC_DB
        value: /app/data/catalog.db
      - key: OBC_SYNC_HOURS
        value: "24"
      - key: OBC_LISTS_HOURS
        value: "168"
      - key: NYT_API_KEY
        sync: false          # set the real value in the Render dashboard
