name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      # --extra recommend: scikit-learn backs the "meer zoals dit" build. Without it
      # ty can't resolve the (optional, try/except-guarded) sklearn imports, and the
      # recommender's tests importorskip themselves into silence.
      - run: uv sync --frozen --extra recommend
      - run: uv run pytest -q
      - run: uv run ruff check src tests
      - run: uv run ty check src

  build:
    needs: test
    # PRs only need the test gate above — don't push images to GHCR for them
    # (and fork PRs lack packages:write anyway). Build/release/deploy run on
    # pushes to main (sha image) and version tags (semver image + Fly deploy).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          # Versioned tags from git tags (vX.Y.Z); no moving "latest".
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # NOTE: the GitHub Release is created by release-please (release-please.yml)
  # when its release PR merges — it also pushes the vX.Y.Z tag that triggers the
  # build + deploy jobs here. deploy.yml no longer creates releases itself.

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')   # version tags only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: 0.4.61   # pin flyctl so setup doesn't query GitHub for "latest" (rate-limit flake)

      - name: Ensure catalog volume is at least 2 GB
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # 68k+ per-book record files exhaust the inode table of a 1GB ext4 volume,
          # so writes fail with ENOSPC even with free blocks. 2GB ~doubles the inode
          # budget. Idempotent (extend only when smaller). Runs *before* deploy so the
          # machine remounts (and resize2fs grows) the filesystem on its restart.
          if [ -z "$FLY_API_TOKEN" ]; then echo "No FLY_API_TOKEN — skipping volume check."; exit 0; fi
          app=online-bibliotheek-catalogus; target=2
          vol=$(flyctl volumes list --app "$app" --json 2>/dev/null \
                | jq -r 'first(.[] | select(.name=="catalog_data"))')
          id=$(echo "$vol" | jq -r '.id // empty')
          size=$(echo "$vol" | jq -r '.size_gb // 0')
          echo "volume '$id' is ${size}GB (target ${target}GB)"
          if [ -n "$id" ] && [ "${size:-0}" -lt "$target" ]; then
            flyctl volumes extend "$id" -s "$target" --app "$app" -y \
              && echo "extended to ${target}GB" \
              || echo "WARNING: volume extend failed (check FLY_API_TOKEN scope)."
          else
            echo "volume already >= ${target}GB; nothing to do."
          fi

      - name: Stage app config (NYT key, site URL)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          OBC_DOMAIN: ${{ vars.OBC_DOMAIN }}
        run: |
          # Push config from CI to Fly so the on-box app/refresh sees it. Staged
          # (--stage) so the deploy below applies it without a separate restart.
          if [ -z "$FLY_API_TOKEN" ]; then echo "No FLY_API_TOKEN — skipping."; exit 0; fi
          app=online-bibliotheek-catalogus
          # NYT Books API key -> enables the NYT bestseller lists.
          if [ -n "$NYT_API_KEY" ]; then
            flyctl secrets set --stage --app "$app" "NYT_API_KEY=$NYT_API_KEY" \
              && echo "staged NYT_API_KEY" \
              || echo "WARNING: could not stage NYT_API_KEY (token scope?)."
          fi
          # Custom domain -> absolute origin for canonical/sitemap/OG URLs (SEO).
          if [ -n "$OBC_DOMAIN" ]; then
            flyctl secrets set --stage --app "$app" "OBC_SITE_URL=https://$OBC_DOMAIN" \
              && echo "staged OBC_SITE_URL=https://$OBC_DOMAIN" \
              || echo "WARNING: could not stage OBC_SITE_URL."
          fi

      - name: Deploy to Fly.io (skips if not configured)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then echo "No FLY_API_TOKEN set — skipping deploy."; exit 0; fi
          # Tag the image with our release version (e.g. v0.3.6) so it shows in
          # `fly image show` / the dashboard instead of Fly's auto deployment-… tag.
          # (Fly's own monotonic release counter — v1, v2, … in `fly status` — is
          # internal and can't be set to our semver.)
          flyctl deploy --remote-only --image-label "${GITHUB_REF_NAME}"
          # Post-deploy refresh is handled in-process: the new machine triggers it
          # on startup (OBC_REFRESH_ON_STARTUP=1 in fly.toml).

      - name: (Re)provision daily refresh cron machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # The scheduled (cron) machine POSTs the token-protected /admin/refresh
          # over Fly's private network once a day. The token comes from the app
          # secret OBC_REFRESH_TOKEN, injected into the machine at runtime. We
          # destroy + recreate so command/schedule changes always take effect.
          # The curl must NOT use -f and must exit 0, otherwise a 409 ("already
          # running") or a brief connection error makes the machine restart-loop.
          if [ -z "$FLY_API_TOKEN" ]; then echo "No FLY_API_TOKEN — skipping cron provisioning."; exit 0; fi
          app=online-bibliotheek-catalogus
          for id in $(flyctl machines list --app "$app" --json 2>/dev/null \
                        | jq -r '.[] | select(.name=="catalog-cron") | .id'); do
            flyctl machine destroy "$id" --app "$app" --force 2>/dev/null \
              && echo "removed old cron machine $id"
          done
          # Target the web *process group* ("app"), NOT "${app}.internal": the bare
          # app name resolves to EVERY machine — including this cron machine itself,
          # which has nothing on :8000 — so curl would hit itself and fail with an
          # instant "connection refused". "app.process.<app>.internal" only returns
          # the web machine. Retries cover the brief window on a fresh scheduled
          # boot before 6PN/private DNS is ready.
          url="http://app.process.${app}.internal:8000/admin/refresh"
          if flyctl machine run curlimages/curl:latest \
               --app "$app" \
               --name catalog-cron \
               --schedule daily \
               --region ams \
               --entrypoint /bin/sh \
               -- -c "curl -sS --connect-timeout 15 --max-time 60 --retry 10 --retry-delay 6 --retry-connrefused --retry-all-errors -X POST -H \"Authorization: Bearer \$OBC_REFRESH_TOKEN\" $url || true"; then
            echo "Daily cron machine 'catalog-cron' provisioned."
          else
            # Non-fatal: the app deploy already succeeded; surface but don't go red.
            echo "WARNING: cron provisioning failed (check FLY_API_TOKEN scope)."
          fi

      - name: Ensure custom-domain TLS certificates
        if: vars.OBC_DOMAIN != ''
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          OBC_DOMAIN: ${{ vars.OBC_DOMAIN }}
        run: |
          # Request Let's Encrypt certs for the apex + www. Fly issues them once the
          # DNS (below) resolves to the app; idempotent — re-runs are no-ops once the
          # cert exists. Non-fatal so a hiccup never fails the deploy.
          if [ -z "$FLY_API_TOKEN" ]; then echo "No FLY_API_TOKEN — skipping certs."; exit 0; fi
          app=online-bibliotheek-catalogus
          for host in "$OBC_DOMAIN" "www.$OBC_DOMAIN"; do
            if flyctl certs show "$host" -a "$app" >/dev/null 2>&1; then
              echo "cert for $host already present"
            else
              flyctl certs add "$host" -a "$app" && echo "requested cert for $host" \
                || echo "WARNING: 'certs add $host' failed."
            fi
          done
          # DNS records (A/AAAA on the apex, CNAME on www) are set once by hand at
          # the registrar — not on every deploy.
