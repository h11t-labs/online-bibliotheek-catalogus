name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          # Versioned tags from git tags (vX.Y.Z); no moving "latest".
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the GitHub Release
    steps:
      - uses: actions/checkout@v5
      - name: Extract changelog section
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes for $VER:"; cat RELEASE_NOTES.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md --verify-tag

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')   # version tags only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io (skips if not configured)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then echo "No FLY_API_TOKEN set — skipping deploy."; exit 0; fi
          flyctl deploy --remote-only
          # Post-deploy refresh is handled in-process: the new machine triggers it
          # on startup (OBC_REFRESH_ON_STARTUP=1 in fly.toml).

      - name: (Re)provision weekly refresh cron machine
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # The scheduled (cron) machine POSTs the token-protected /admin/refresh
          # over Fly's private network once a week. The token comes from the app
          # secret OBC_REFRESH_TOKEN, injected into the machine at runtime. We
          # destroy + recreate so command/schedule changes always take effect.
          # The curl must NOT use -f and must exit 0, otherwise a 409 ("already
          # running") or a brief connection error makes the machine restart-loop.
          if [ -z "$FLY_API_TOKEN" ]; then echo "No FLY_API_TOKEN — skipping cron provisioning."; exit 0; fi
          app=online-bibliotheek-catalogus
          for id in $(flyctl machines list --app "$app" --json 2>/dev/null \
                        | jq -r '.[] | select(.name=="catalog-cron") | .id'); do
            flyctl machine destroy "$id" --app "$app" --force 2>/dev/null \
              && echo "removed old cron machine $id"
          done
          url="http://${app}.internal:8000/admin/refresh"
          if flyctl machine run curlimages/curl:latest \
               --app "$app" \
               --name catalog-cron \
               --schedule weekly \
               --region ams \
               --entrypoint /bin/sh \
               -- -c "curl -sS -m 60 -X POST -H \"Authorization: Bearer \$OBC_REFRESH_TOKEN\" $url || true"; then
            echo "Weekly cron machine 'catalog-cron' provisioned."
          else
            # Non-fatal: the app deploy already succeeded; surface but don't go red.
            echo "WARNING: cron provisioning failed (check FLY_API_TOKEN scope)."
          fi
