name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE }}
          # Versioned tags from git tags (vX.Y.Z); no moving "latest".
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,enable=${{ !startsWith(github.ref, 'refs/tags/') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the GitHub Release
    steps:
      - uses: actions/checkout@v5
      - name: Extract changelog section
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v v="$VER" '
            $0 ~ "^## \\[" v "\\]" {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "Release notes for $VER:"; cat RELEASE_NOTES.md
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md --verify-tag

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')   # version tags only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io (skips if not configured)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then echo "No FLY_API_TOKEN set — skipping deploy."; exit 0; fi
          flyctl deploy --remote-only

      - name: Trigger catalog refresh after deploy
        env:
          OBC_REFRESH_TOKEN: ${{ secrets.OBC_REFRESH_TOKEN }}
        run: |
          # Rebuild/refresh the catalog on the new release (the work runs in the
          # web machine where the volume lives; the call returns 202 immediately).
          # On a fresh volume the app does a full harvest; otherwise an incremental
          # sync. Non-fatal: a failed trigger must not fail the deploy.
          if [ -z "$OBC_REFRESH_TOKEN" ]; then
            echo "No OBC_REFRESH_TOKEN — skipping post-deploy refresh."; exit 0
          fi
          url="https://online-bibliotheek-catalogus.fly.dev/admin/refresh"
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 30 -X POST "$url" \
              -H "Authorization: Bearer $OBC_REFRESH_TOKEN" || echo 000)
            echo "attempt $i -> HTTP $code"
            case "$code" in
              202) echo "refresh started"; exit 0 ;;
              409) echo "refresh already running"; exit 0 ;;
            esac
            sleep 10
          done
          echo "post-deploy refresh did not start (non-fatal)"; exit 0
